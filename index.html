<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Flipbook</title>

<style>
body {
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

#viewer {
  display:flex;
  gap:0px;
  align-items:center;
  justify-content:center;
  width:95vw;
  height:90vh;
}

.page {
  width:47vw;
  height:90vh;
  background:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.page img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.35);
    border: none;
    font-size: 22px;
    padding: 10px 16px;
    cursor: pointer;
    z-index: 1000;
    border-radius: 8px;
    backdrop-filter: blur(6px);
}

#prevBtn{
  left:20px;
}

#nextBtn{
  right:20px;
}

</style>
</head>
<body>

<button id="prevBtn" class="nav">⬅</button>

<div id="viewer">
  <div class="page"><img id="leftPage" src="page1.jpg"></div>
  <div class="page" id="rightContainer"><img id="rightPage" src="page2.jpg"></div>
</div>

<button id="nextBtn" class="nav">➡</button>

<script>

const totalPages = 24;
let currentPage = 1;

const leftImg = document.getElementById("leftPage");
const rightImg = document.getElementById("rightPage");
const rightContainer = document.getElementById("rightContainer");

function updatePages(){

  leftImg.src = `page${currentPage}.jpg`;

  if(currentPage === 1){
    rightContainer.style.visibility = "hidden";
  } else if(currentPage < totalPages){
    rightContainer.style.visibility = "visible";
    rightImg.src = `page${currentPage+1}.jpg`;
  } else {
    rightContainer.style.visibility = "hidden";
  }
}


document.getElementById("nextBtn").onclick = () => {

  if(currentPage === 1){
    currentPage = 2;
  }
  else if(currentPage + 2 <= totalPages){
    currentPage += 2;
  }

  updatePages();
};


document.getElementById("prevBtn").onclick = () => {

  if(currentPage === 2){
    currentPage = 1;
  }
  else if(currentPage > 2){
    currentPage -= 2;
  }

  updatePages();
};

updatePages();

</script>

</body>
</html>
